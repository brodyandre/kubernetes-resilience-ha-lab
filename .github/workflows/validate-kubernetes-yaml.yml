name: Validate Kubernetes YAML

on:
  push:
  pull_request:

jobs:
  validate-yaml:
    name: Validate YAML and yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml yamllint

      - name: Validate YAML syntax
        shell: bash
        run: |
          set -euo pipefail

          git ls-files '*.yaml' '*.yml' > /tmp/yaml-files.txt
          if [ ! -s /tmp/yaml-files.txt ]; then
            echo "No YAML files found."
            exit 0
          fi

          python - <<'PY'
          import pathlib
          import sys
          import yaml

          files = [line.strip() for line in pathlib.Path("/tmp/yaml-files.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          failed = False

          for file in files:
              path = pathlib.Path(file)
              try:
                  with path.open("r", encoding="utf-8") as f:
                      list(yaml.safe_load_all(f))
              except Exception as exc:
                  failed = True
                  print(f"[YAML syntax error] {file}: {exc}")

          if failed:
              sys.exit(1)
          print(f"Validated YAML syntax for {len(files)} file(s).")
          PY

      - name: Run yamllint
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            yamllint -c .yamllint.yml "$file"
          done < /tmp/yaml-files.txt

  validate-shell:
    name: Validate shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(find scripts -type f -name '*.sh' | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "No shell scripts found in scripts/."
            exit 0
          fi
          shellcheck "${shell_files[@]}"

      - name: Check executable bit or documented chmod
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(find scripts -type f -name '*.sh' | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "No shell scripts found in scripts/."
            exit 0
          fi

          missing_exec=()
          for file in "${shell_files[@]}"; do
            if [ ! -x "$file" ]; then
              missing_exec+=("$file")
            fi
          done

          if [ "${#missing_exec[@]}" -eq 0 ]; then
            echo "All scripts in scripts/ have executable permission."
            exit 0
          fi

          echo "::warning::Some scripts are not executable in this checkout."
          printf ' - %s\n' "${missing_exec[@]}"

          if grep -q "chmod +x scripts/\\*.sh" README.md; then
            echo "README documents how to apply executable permission (chmod +x scripts/*.sh)."
            exit 0
          fi

          echo "Missing executable permission and no chmod guidance found in README.md."
          echo "Add executable bit or document: chmod +x scripts/*.sh"
          exit 1
