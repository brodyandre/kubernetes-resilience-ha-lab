apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  namespace: resilience-scheduling
  labels:
    app: cache-service
    tier: cache
    module: pod-affinity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cache-service
      tier: cache
      module: pod-affinity
  template:
    metadata:
      labels:
        app: cache-service
        tier: cache
        module: pod-affinity
    spec:
      containers:
        - name: cache
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
