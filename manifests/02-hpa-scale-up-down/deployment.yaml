apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-scale-app
  namespace: resilience-hpa
  labels:
    app: hpa-scale-app
    module: hpa-scale-up-down
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-scale-app
      module: hpa-scale-up-down
  template:
    metadata:
      labels:
        app: hpa-scale-app
        module: hpa-scale-up-down
    spec:
      containers:
        - name: hpa-scale-app
          image: registry.k8s.io/hpa-example
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
