apiVersion: v1
kind: Service
metadata:
  name: hpa-scale-app
  namespace: resilience-hpa
  labels:
    app: hpa-scale-app
    module: hpa-scale-up-down
spec:
  type: ClusterIP
  selector:
    app: hpa-scale-app
    module: hpa-scale-up-down
  ports:
    - name: http
      port: 80
      targetPort: http
