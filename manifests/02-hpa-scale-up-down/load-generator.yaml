apiVersion: v1
kind: Pod
metadata:
  name: hpa-scale-load-generator
  namespace: resilience-hpa
  labels:
    app: hpa-scale-load-generator
    module: hpa-scale-up-down
spec:
  restartPolicy: Always
  containers:
    - name: load-generator
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "Iniciando carga HTTP continua para hpa-scale-app..."
          while true; do
            wget -q -O- http://hpa-scale-app.resilience-hpa.svc.cluster.local/ >/dev/null
          done
